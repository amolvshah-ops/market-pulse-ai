<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Pulse AI Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #0b1020;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      color: #cbd5e1;
    }

    .card {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #334155;
      max-width: 600px;
    }

    ul {
      margin-top: 16px;
      padding-left: 20px;
    }

    li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Market Pulse AI Dashboard</h1>
  <p>Frontend dashboard starter is ready.</p>

  <div class="card">
    <h2>Agents</h2>
    <ul>
      <li>Technical Agent</li>
      <li>Sentiment Agent</li>
      <li>ML Agent</li>
      <li>Risk Agent</li>
    </ul>
  </div>
</body>
</html>
